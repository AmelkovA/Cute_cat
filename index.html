<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cute Cat — Кот-психолог</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fff9fb 0%, #fff0f3 50%, #ffe9ef 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        .app-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(255, 141, 161, 0.25);
            padding: 30px 40px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 225, 230, 0.8);
            position: relative;
        }

        .premium-banner {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 180, 71, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 180, 71, 0.8); }
        }

        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            border: 2px solid #ffd1dc;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #ff8da1;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            z-index: 10;
        }

        .back-button:hover {
            background: #fff0f3;
            transform: translateX(-3px);
        }

        .language-switch {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 40px;
            border: 2px solid #ffe4e1;
            z-index: 10;
        }

        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #bcaaa4;
        }

        .lang-btn.active {
            background: #ff8da1;
            color: white;
        }

        .cat-hero-container {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1));
        }

        .cat-hero-container:hover {
            transform: scale(1.02);
        }

        .cat-hero-container svg {
            width: 100%;
            height: auto;
            display: block;
        }

        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }

        .cat-eyes {
            animation: blink 4s infinite;
            transform-origin: center;
        }

        .thought-bubble {
            background: white;
            border-radius: 35px;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 95%;
            min-height: 150px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 2px solid #ffe0e6;
            background: linear-gradient(135deg, #fff, #fffafc);
        }

        .thought-bubble::before {
            content: "💭";
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            opacity: 0.6;
        }

        .cat-message {
            font-size: 20px;
            font-weight: 600;
            color: #ff8da1;
            line-height: 1.5;
            text-align: left;
        }

        .cat-message small {
            font-size: 13px;
            color: #bcaaa4;
            display: block;
            margin-top: 12px;
            text-align: right;
            font-style: italic;
        }

        .pet-button {
            background: linear-gradient(135deg, #ffb7c5, #ff8da1);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 141, 161, 0.4);
            margin: 15px 0;
        }

        .pet-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 141, 161, 0.5);
        }

        .cat-name {
            font-size: 24px;
            font-weight: 800;
            color: #ff8da1;
            margin: 10px 0 5px;
            letter-spacing: 1px;
        }

        .cat-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .cat-option {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 40px;
            background: #fff;
            border: 2px solid #ffe4e1;
            transition: all 0.3s;
            font-weight: 700;
            color: #ffb7b2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }

        .cat-option.active {
            border-color: #ff8da1;
            background: #fff0f3;
            color: #ff8da1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.2);
        }

        .help-section {
            background: #fff9fb;
            border-radius: 40px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #ffe4e1;
        }

        .help-title {
            font-size: 18px;
            color: #b28dff;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .help-input {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }

        .help-input:focus {
            border-color: #b28dff;
            box-shadow: 0 0 0 3px rgba(178, 141, 255, 0.1);
        }

        .help-button, .pay-button {
            background: #b28dff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
        }

        .pay-button {
            background: linear-gradient(135deg, #ffd966, #ffb347);
        }

        .help-button:hover, .pay-button:hover {
            transform: translateY(-2px);
        }

        .help-button:hover { background: #9f73ff; }
        .pay-button:hover { background: linear-gradient(135deg, #ffc857, #ff9f2e); }

        .loading-dots {
            display: inline-block;
        }
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        .bounce-animation {
            animation: bounce 0.5s ease;
        }

        .close-button {
            background: #ffe4e1;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }

        @media (max-width: 600px) {
            .app-container { padding: 20px; }
            .cat-message { font-size: 16px; }
            .thought-bubble::before { display: none; }
            .language-switch { top: 15px; right: 15px; }
            .back-button { top: 15px; left: 15px; }
        }

        .telegram-header { height: env(safe-area-inset-top); }
    </style>
</head>
<body>
<div class="telegram-header"></div>
<button class="back-button" onclick="closeApp()">← Закрыть</button>
<div class="language-switch">

                    <radialGradient id="furGradient" cx="50%" cy="50%" r="50%">
                        <stop offset="0%" stop-color="#fff8fa"/><stop offset="100%" stop-color="#ffeef2"/>
                    </radialGradient>
                    <filter id="softShadow" x="-0.02" y="-0.02" width="1.04" height="1.04">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/><feOffset dx="2" dy="2"/>
                        <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
                        <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>
            </svg>
        </div>
        <div class="cat-name" id="catName">✨ Зефирка ✨</div>
        <div class="cat-selector">
            <div class="cat-option active" data-cat="marshmallow" onclick="selectCat('marshmallow', this)">☁️ <span id="catName1">Зефирка</span></div>
            <div class="cat-option" data-cat="ginger" onclick="selectCat('ginger', this)">🦁 <span id="catName2">Рыжик</span></div>
            <div class="cat-option" data-cat="misty" onclick="selectCat('misty', this)">🩶 <span id="catName3">Дымка</span></div>
        </div>
        <div class="thought-bubble">
            <div class="cat-message" id="catMessage">
                Привет, мой хороший! 👋<br><small>Я здесь, чтобы поддержать тебя</small>
            </div>
        </div>
        <button class="pet-button" onclick="petCat()" id="petBtn">🐾 Погладить котика 🐾</button>
    </div>

    <div class="help-section">
        <div class="help-title" id="helpTitle">💬 Расскажи, что у тебя на душе 💬</div>
        <input type="text" class="help-input" id="helpInput" placeholder="Напиши, и я тебя поддержу...">
        <button class="help-button" id="helpButton" onclick="askCat()">✨ Спросить у котика ✨</button>
        <button class="pay-button" id="payButton" onclick="showPaymentOptions()">💎 Оплатить премиум (10 USDT / год)</button>
    </div>

    <button class="close-button" onclick="closeApp()">Закрыть приложение</button>
</div>

    // ---- Премиум статус ----
    let isPremium = localStorage.getItem('cat_premium') === 'true';

    function activatePremium() {
        isPremium = true;
        localStorage.setItem('cat_premium', 'true');
        document.getElementById('premiumBanner').style.display = 'inline-block';
        document.getElementById('catMessage').innerHTML = `✨ Премиум активирован! Теперь я могу поддержать тебя по-настоящему ✨<br><small>Спрашивай о чём угодно 🐱</small>`;
    }

    // ---- Оплата (демо-поток) ----
    const WALLETS = {
        eth: { address: "0x8C8fa7F22b88845c0Ec54BAF2d3d8d82BDd4C84b", network: "Ethereum (ERC20)" },
        bsc: { address: "0x8C8fa7F22b88845c0Ec54BAF2d3d8d82BDd4C84b", network: "BSC (BEP20)" },

    };
    let currentNetwork = 'eth';

    function showPaymentOptions() {
        const msgBox = document.getElementById('catMessage');
        msgBox.innerHTML = `💎 Выберите сеть для оплаты 10 USDT 💎<br><br>

        <button onclick="selectNetwork('bsc')">🔶 BSC (BEP20)</button><br>

        document.getElementById('catMessage').innerHTML = `

            ✅ После оплаты нажмите кнопку ниже:<br>
            <button onclick="confirmPayment()">✅ Я оплатил(а)</button><br><br>
            ⚠️ Внимание: премиум активируется вручную после проверки.
        `;
    }
    window.selectNetwork = selectNetwork;

    function confirmPayment() {
        activatePremium();
        document.getElementById('catMessage').innerHTML = `🎉 Спасибо! Премиум активирован. Теперь я могу поддержать тебя полноценно. Спрашивай о чём угодно. 🐱💖`;
    }
    window.confirmPayment = confirmPayment;

    // ---- AI-запрос (только для премиума) ----
    async function askCat() {
        const input = document.getElementById('helpInput');
        const question = input.value.trim();
        const msgBox = document.getElementById('catMessage');
        if (!question) {
            msgBox.innerHTML = `🐱 Напиши что-нибудь, и я отвечу.<br><small>Я умею слушать и поддерживать</small>`;
            return;
        }

        if (!isPremium) {
            msgBox.innerHTML = `💎 Для того, чтобы я мог поддержать тебя в твоей ситуации, понимая её полностью — оплати премиум доступ. 💎<br><small>Всего 10 USDT на 12 месяцев</small>`;
            return;
        }

        // ПРЕМИУМ → AI
        const currentLang = document.getElementById('langEn').classList.contains('active') ? 'en' : 'ru';
        const catName = {
            marshmallow: currentLang === 'ru' ? "Зефирка" : "Marshmallow",
            ginger: currentLang === 'ru' ? "Рыжик" : "Ginger",
            misty: currentLang === 'ru' ? "Дымка" : "Misty"
        }[document.querySelector('.cat-option.active').dataset.cat] || "Зефирка";

        msgBox.innerHTML = `Мурр... я слушаю тебя внимательно<span class='loading-dots'></span><br><small>Я хочу помочь тебе по-настоящему</small>`;
        try {
            const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "HTTP-Referer": "https://amelkova.github.io/Cute_cat/",
                    "X-Title": "Cute Cat Psychologist"
                },
                body: JSON.stringify({
                    model: "google/gemini-2.0-flash-exp:free",
                    messages: [
                        { role: "system", content: currentLang === 'ru' ?
                            "Ты профессиональный психолог в образе нежного кота. Отвечай тепло, мудро, коротко (2-4 предложения). Используй кошачьи метафоры, но давай реальную поддержку. Всегда заканчивай добрым советом." :
                            "You are a professional psychologist in the form of a gentle cat. Respond warmly, wisely, concisely (2-4 sentences). Use cat metaphors while giving real support. Always end with a kind piece of advice." },
                        { role: "user", content: question }
                    ],
                    temperature: 0.85,
                    max_tokens: 300
                })
            });
            const data = await response.json();
            let answer = data?.choices?.[0]?.message?.content;
            if (!answer) throw new Error("no answer");
            msgBox.innerHTML = `${answer}<br><small>🐱 ${catName}</small>`;
        } catch(e) {
            msgBox.innerHTML = `✨ Немного магии сбоит, но я всё равно рядом. Попробуй ещё раз ✨<br><small>🐱 ${catName}</small>`;
        }
    }

    function petCat() {
        const hero = document.getElementById('catHero');
        hero.classList.add('bounce-animation');
        setTimeout(() => hero.classList.remove('bounce-animation'), 500);
        const isEn = document.getElementById('langEn').classList.contains('active');
        const phrases = isEn ? petPhrasesEn : petPhrasesRu;
        const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
        document.getElementById('catMessage').innerHTML = `${randomPhrase}<br><small>Спасибо, что погладил(а)! 🐱</small>`;
    }

    // ---- Остальной интерфейс (выбор котика, язык) ----
    let currentCat = 'marshmallow';
    const catNames = { marshmallow: { ru: "Зефирка", en: "Marshmallow" }, ginger: { ru: "Рыжик", en: "Ginger" }, misty: { ru: "Дымка", en: "Misty" } };

    function selectCat(catId, element) {
        currentCat = catId;
        document.querySelectorAll('.cat-option').forEach(opt => opt.classList.remove('active'));
        element.classList.add('active');
        const lang = document.getElementById('langEn').classList.contains('active') ? 'en' : 'ru';
        document.getElementById('catName').innerHTML = `✨ ${catNames[catId][lang]} ✨`;
        document.getElementById('catMessage').innerHTML = `Мур! Я ${catNames[catId][lang]}, и я готов(а) тебя слушать!`;
    }

    function setLanguage(lang) {
        document.getElementById('langEn').classList.toggle('active', lang === 'en');
        document.getElementById('langRu').classList.toggle('active', lang === 'ru');
        document.getElementById('catName1').innerText = catNames.marshmallow[lang];
        document.getElementById('catName2').innerText = catNames.ginger[lang];
        document.getElementById('catName3').innerText = catNames.misty[lang];
        document.getElementById('catName').innerHTML = `✨ ${catNames[currentCat][lang]} ✨`;
        document.getElementById('helpTitle').innerHTML = lang === 'ru' ? "💬 Расскажи, что у тебя на душе 💬" : "💬 What's on your mind? 💬";
        document.getElementById('helpInput').placeholder = lang === 'ru' ? "Напиши, и я тебя поддержу..." : "Share your thoughts, and I'll listen...";
        document.getElementById('helpButton').innerHTML = lang === 'ru' ? "✨ Спросить у котика ✨" : "✨ Ask the kitty ✨";
        document.getElementById('payButton').innerHTML = lang === 'ru' ? "💎 Оплатить премиум (10 USDT / год)" : "💎 Pay premium (10 USDT / year)";
        document.getElementById('petBtn').innerHTML = lang === 'ru' ? "🐾 Погладить котика 🐾" : "🐾 Pet the kitty 🐾";
    }

    // Инициализация
    const savedLang = localStorage.getItem('cat_lang') || 'ru';
    setLanguage(savedLang);
    if (isPremium) document.getElementById('premiumBanner').style.display = 'inline-block';
    window.askCat = askCat;
    window.petCat = petCat;
    window.selectCat = selectCat;
    window.setLanguage = setLanguage;
