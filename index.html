<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Cute Cat — Your Fluffy Companion</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Quicksand', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #fff9fb 0%, #fff0f3 50%, #ffe9ef 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        /* Telegram Theme Variables */
        body {
            --tg-color-scheme: light;
            --tg-bg-color: var(--tg-theme-bg-color, #ffffff);
            --tg-text-color: var(--tg-theme-text-color, #000000);
            --tg-hint-color: var(--tg-theme-hint-color, #999999);
            --tg-link-color: var(--tg-theme-link-color, #2481cc);
            --tg-button-color: var(--tg-theme-button-color, #2481cc);
            --tg-button-text-color: var(--tg-theme-button-text-color, #ffffff);
        }
        
        .app-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            background: rgba(255,255,255,0.98);
            border-radius: 60px;
            box-shadow: 0 30px 60px rgba(255, 141, 161, 0.25);
            padding: 30px 40px 40px;
            text-align: center;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 225, 230, 0.8);
            position: relative;
        }
        
        .premium-banner {
            background: linear-gradient(135deg, #ffd966, #ffb347);
            color: white;
            padding: 12px 20px;
            border-radius: 40px;
            margin-bottom: 20px;
            font-weight: bold;
            display: inline-block;
            animation: glow 2s ease-in-out infinite;
        }
        
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 180, 71, 0.5); }
            50% { box-shadow: 0 0 20px rgba(255, 180, 71, 0.8); }
        }
        
        .back-button {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255,255,255,0.9);
            border: 2px solid #ffd1dc;
            border-radius: 30px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #ff8da1;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: all 0.3s;
            z-index: 10;
        }
        
        .back-button:hover {
            background: #fff0f3;
            transform: translateX(-3px);
        }
        
        .language-switch {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            background: white;
            padding: 5px;
            border-radius: 40px;
            border: 2px solid #ffe4e1;
            z-index: 10;
        }
        
        .lang-btn {
            border: none;
            background: transparent;
            padding: 6px 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            color: #bcaaa4;
        }
        
        .lang-btn.active {
            background: #ff8da1;
            color: white;
        }
        
        .cat-hero-container {
            width: 100%;
            max-width: 500px;
            height: auto;
            margin: 20px auto;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.2, 0.64, 1);
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.1));
        }
        
        .cat-hero-container:hover {
            transform: scale(1.02);
        }
        
        .cat-hero-container svg {
            width: 100%;
            height: auto;
            display: block;
        }
        
        @keyframes blink {
            0%, 90%, 100% { transform: scaleY(1); }
            95% { transform: scaleY(0.05); }
        }
        
        .cat-eyes {
            animation: blink 4s infinite;
            transform-origin: center;
        }
        
        .thought-bubble {
            background: white;
            border-radius: 35px;
            padding: 25px 30px;
            margin: 20px auto;
            max-width: 95%;
            min-height: 150px;
            position: relative;
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 2px solid #ffe0e6;
            background: linear-gradient(135deg, #fff, #fffafc);
        }
        
        .thought-bubble::before {
            content: "💭";
            position: absolute;
            left: -25px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 30px;
            opacity: 0.6;
        }
        
        .cat-message {
            font-size: 20px;
            font-weight: 600;
            color: #ff8da1;
            line-height: 1.5;
            text-align: left;
        }
        
        .cat-message small {
            font-size: 13px;
            color: #bcaaa4;
            display: block;
            margin-top: 12px;
            text-align: right;
            font-style: italic;
        }
        
        .pet-button {
            background: linear-gradient(135deg, #ffb7c5, #ff8da1);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(255, 141, 161, 0.4);
            margin: 15px 0;
        }
        
        .pet-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(255, 141, 161, 0.5);
        }
        
        .cat-name {
            font-size: 24px;
            font-weight: 800;
            color: #ff8da1;
            margin: 10px 0 5px;
            letter-spacing: 1px;
        }
        
        .cat-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .cat-option {
            cursor: pointer;
            padding: 10px 20px;
            border-radius: 40px;
            background: #fff;
            border: 2px solid #ffe4e1;
            transition: all 0.3s;
            font-weight: 700;
            color: #ffb7b2;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
        }
        
        .cat-option.active {
            border-color: #ff8da1;
            background: #fff0f3;
            color: #ff8da1;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 141, 161, 0.2);
        }
        
        .help-section {
            background: #fff9fb;
            border-radius: 40px;
            padding: 20px;
            margin: 25px 0;
            border: 1px solid #ffe4e1;
        }
        
        .help-title {
            font-size: 18px;
            color: #b28dff;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .help-input {
            width: 100%;
            padding: 16px 20px;
            background: white;
            border: 2px solid #ffe4e1;
            border-radius: 30px;
            font-size: 16px;
            outline: none;
            font-family: inherit;
        }
        
        .help-input:focus {
            border-color: #b28dff;
            box-shadow: 0 0 0 3px rgba(178, 141, 255, 0.1);
        }
        
        .help-button {
            background: #b28dff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 700;
            margin-top: 12px;
            transition: all 0.3s;
            width: 100%;
            cursor: pointer;
        }
        
        .help-button:hover {
            background: #9f73ff;
            transform: translateY(-2px);
        }
        
        .loading-dots {
            display: inline-block;
        }
        
        .loading-dots::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .bounce-animation {
            animation: bounce 0.5s ease;
        }
        
        .close-button {
            background: #ffe4e1;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 20px;
            font-weight: 600;
            font-size: 16px;
            width: 100%;
        }
        
        @media (max-width: 600px) {
            .app-container {
                padding: 20px;
            }
            .cat-message {
                font-size: 16px;
            }
            .thought-bubble::before {
                display: none;
            }
            .language-switch {
                top: 15px;
                right: 15px;
            }
            .back-button {
                top: 15px;
                left: 15px;
            }
        }
        
        /* Telegram specific */
        .telegram-header {
            height: env(safe-area-inset-top);
        }
    </style>
</head>
<body>
    <div class="telegram-header"></div>
    
    <button class="back-button" onclick="closeApp()">
        ← Закрыть
    </button>
    
    <div class="language-switch">
        <button class="lang-btn" id="langEn" onclick="setLanguage('en')">EN</button>
        <button class="lang-btn" id="langRu" onclick="setLanguage('ru')">RU</button>
    </div>
    
    <div class="app-container">
        <div class="premium-banner" id="premiumBanner">
            ✨ PREMIUM ACTIVE ✨ Professional Cat Psychologist ✨
        </div>
        
        <div class="hero-section">
            <div class="cat-hero-container" id="catHero" onclick="petCat()">
                <svg id="catSvg" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
                    <defs>

                    <path d="M120 100 L80 40 L140 80 Z" fill="#fce4ec" stroke="#ffc0d0" stroke-width="3"/>

                    </g>
                    <ellipse cx="200" cy="215" rx="18" ry="14" fill="#ffb7b2" stroke="#ff8da1" stroke-width="2"/>
                    <path d="M180 235 Q200 260 220 235" fill="none" stroke="#ff8da1" stroke-width="6" stroke-linecap="round"/>
                    <circle cx="174" cy="241" r="5" fill="#ffb7b2" opacity="0.5"/>

                    <path d="M120 230 L70 235" stroke="#b0a0a0" stroke-width="2" stroke-linecap="round"/>
                    <path d="M280 210 L330 205" stroke="#b0a0a0" stroke-width="2" stroke-linecap="round"/>

                    <ellipse cx="130" cy="215" rx="20" ry="12" fill="#ffebef" opacity="0.7"/>
                    <ellipse cx="270" cy="215" rx="20" ry="12" fill="#ffebef" opacity="0.7"/>
                    <path d="M90 270 L70 285 L85 300 L105 285 Z" fill="#ffe4e1" stroke="#ffc0d0" stroke-width="2"/>
                    <path d="M310 330 Q330 320 335 300 Q340 280 325 285 Q315 290 310 310 Z" fill="#ffe4e1" stroke="#ffc0d0" stroke-width="2"/>
                </svg>
            </div>
            
            <div class="cat-name" id="catName">✨ Marshmallow ✨</div>
            
            <div class="cat-selector">
                <div class="cat-option active" data-cat="marshmallow" onclick="selectCat('marshmallow', this)">☁️ <span id="catName1">Marshmallow</span></div>
                <div class="cat-option" data-cat="ginger" onclick="selectCat('ginger', this)">🦁 <span id="catName2">Ginger</span></div>
                <div class="cat-option" data-cat="misty" onclick="selectCat('misty', this)">🩶 <span id="catName3">Misty</span></div>
            </div>
            
            <div class="thought-bubble">
                <div class="cat-message" id="catMessage">
                    Hello there, dear friend! 👋<br>
                    <small>I'm here to listen and support you</small>
                </div>
            </div>
            
            <button class="pet-button" onclick="petCat()" id="petBtn">
                🐾 Pet the kitty 🐾
            </button>
        </div>
        
        <div class="help-section">
            <div class="help-title" id="helpTitle">
                💬 What's on your mind? 💬
            </div>
            <input type="text" class="help-input" id="helpInput" placeholder="Share your thoughts, and I'll listen...">
            <button class="help-button" id="helpButton" onclick="askCat()">
                ✨ Ask the kitty ✨
            </button>
        </div>
        
        <button class="close-button" onclick="closeApp()">
            Закрыть приложение
        </button>
    </div>

    <script>
        // Telegram WebApp
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.enableClosingConfirmation();
        
        function closeApp() {
            tg.close();
        }
        
        // Конфигурация
        const translations = {
            en: {
                catName: "✨ Marshmallow ✨",
                catNames: { marshmallow: "Marshmallow", ginger: "Ginger", misty: "Misty" },
                systemPrompt: `You are a professional psychologist who happens to be a fluffy, gentle cat. 
Your task is to provide warm, supportive, and psychologically insightful responses. 
Style: soft, nurturing, wise like a therapy cat. 
Use gentle cat metaphors (purrs, paws, whiskers) combined with genuine psychological wisdom.
Keep responses concise but meaningful (2-4 sentences). 
Always end with a small piece of practical advice or affirmation.
Be empathetic, non-judgmental, and create a safe space for sharing.
Use emojis sparingly but meaningfully.`,
                catMessages: {
                    greeting: "Hello there, dear friend! 👋<br><small>I'm here to listen and support you</small>",
                    pet: (msg) => `${msg}<br><small>Thank you for petting me! 🐱</small>`,
                    thinking: "Purr... I'm listening carefully<span class='loading-dots'></span><br><small>Give me a moment to understand</small>",
                    welcomeBack: "Welcome back, my dear friend! 💖<br><small>I'm here whenever you need to talk</small>"
                },
                supportMessages: [
                    "You're doing everything within your power, and that's already remarkable! 🌸",
                    "I believe in you! Remember, even the smallest step is progress. 🐾",
                    "May today bring you some tenderness and peace. 💖",
                    "Purr-purr! You're not alone — I'm always by your side. ✨",
                    "Your feelings matter. Allow yourself some time to rest. ☁️"
                ],
                helpTitle: "💬 What's on your mind? 💬",
                helpPlaceholder: "Share your thoughts, and I'll listen...",
                helpButton: "✨ Ask the kitty ✨",
                petButton: "🐾 Pet the kitty 🐾"
            },
            ru: {
                catName: "✨ Зефирка ✨",
                catNames: { marshmallow: "Зефирка", ginger: "Рыжик", misty: "Дымка" },
                systemPrompt: `Ты профессиональный психолог, который случайно оказался пушистым, нежным котом. 
Твоя задача — давать тёплые, поддерживающие и психологически глубокие ответы. 
Стиль: мягкий, заботливый, мудрый, как кот-терапевт. 
Используй нежные кошачьи метафоры (мурчание, лапки, усы) в сочетании с настоящей психологической мудростью. 
Отвечай кратко, но содержательно (2-4 предложения). 
Всегда заканчивай маленьким советом или поддерживающим утверждением. 
Будь эмпатичным, безоценочным, создавай безопасное пространство для разговора. 
Используй эмодзи умеренно, но со смыслом.`,
                catMessages: {
                    greeting: "Привет, мой хороший! 👋<br><small>Я здесь, чтобы выслушать и поддержать тебя</small>",
                    pet: (msg) => `${msg}<br><small>Спасибо, что погладил(а)! 🐱</small>`,
                    thinking: "Мурр... Я внимательно слушаю<span class='loading-dots'></span><br><small>Дай мне мгновение, чтобы понять</small>",
                    welcomeBack: "С возвращением, мой дорогой друг! 💖<br><small>Я всегда рядом, когда тебе нужно поговорить</small>"
                },
                supportMessages: [
                    "Ты делаешь всё, что в твоих силах, и это уже много! 🌸",
                    "Я верю в тебя! Помни, даже маленький шаг — это прогресс. 🐾",
                    "Пусть сегодняшний день принесёт тебе немного нежности и покоя. 💖",
                    "Мур-мур! Ты не один, я всегда рядом. ✨",
                    "Твои чувства важны. Дай себе время отдохнуть. ☁️"

                helpTitle: "💬 Расскажи, что у тебя на душе 💬",
                helpPlaceholder: "Поделись своими мыслями, я внимательно слушаю...",
                helpButton: "✨ Спросить у котика ✨",
                petButton: "🐾 Погладить котика 🐾"
            }
        };
        
        let currentLang = 'ru';
        let currentCat = 'marshmallow';
        
        const catSvgs = {

 opacity="0.7"/><path d="M90 270 L70 285 L85 300 L105 285 Z" fill="#cbd7e4" stroke="#8f9eb0" stroke-width="2"/><path d="M310 330 Q330 320 335 300 Q340 280 325 285 Q315 290 310 310 Z" fill="#cbd7e4" stroke="#8f9eb0" stroke-width="2"/></svg>`

        const FALLBACK_RESPONSES = {
            en: [
                "I hear you, dear friend. Sometimes naming what we feel is the first step toward healing. Take a deep breath with me... in... and out. You're doing wonderfully. 🌸",
                "Your feelings are valid, and they matter. In this moment, I want you to know that you are enough, exactly as you are. Let's sit together in quiet understanding. 💖",
                "The bravest thing you can do is to reach out when you're struggling. I'm proud of you for sharing. Remember, even the strongest purr starts with a single breath. 🐱",
                "What you're going through sounds challenging, but I believe in your resilience. Like a cat landing on its feet, you have the strength within you to find your balance. ✨"
            ],
            ru: [
                "Я слышу тебя, мой дорогой друг. Иногда просто назвать свои чувства — это первый шаг к исцелению. Сделай глубокий вдох со мной... вдох... и выдох. У тебя замечательно получается. 🌸",
                "Твои чувства важны, и они имеют значение. В этот момент я хочу, чтобы ты знал(а): ты достаточен(а) именно такой(ая), какой(ая) ты есть. Давай просто посидим вместе в тихом понимании. 💖",
                "Самое смелое, что можно сделать — это обратиться за помощью, когда тебе трудно. Я горжусь тем, что ты делишься. Помни, даже самое сильное мурлыканье начинается с одного вдоха. 🐱",
                "То, через что ты проходишь, звучит непросто, но я верю в твою устойчивость. Как кошка, которая всегда приземляется на лапы, у тебя есть сила внутри, чтобы обрести равновесие. ✨"
            ]
        };
        
        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('cat_lang', lang);
            
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            document.getElementById('langRu').classList.toggle('active', lang === 'ru');
            
            updateUITexts();
            selectCat(currentCat, document.querySelector(`.cat-option[data-cat="${currentCat}"]`));
            
            const msgBox = document.getElementById('catMessage');
            msgBox.innerHTML = translations[lang].catMessages.greeting;
        }
        
        function updateUITexts() {
            const t = translations[currentLang];
            
            document.getElementById('catName').innerHTML = t.catName;
            document.getElementById('catName1').innerText = t.catNames.marshmallow;
            document.getElementById('catName2').innerText = t.catNames.ginger;
            document.getElementById('catName3').innerText = t.catNames.misty;
            document.getElementById('helpTitle').innerHTML = t.helpTitle;
            document.getElementById('helpInput').placeholder = t.helpPlaceholder;
            document.getElementById('helpButton').innerHTML = t.helpButton;
            document.getElementById('petBtn').innerHTML = t.petButton;
        }
        
        function selectCat(catId, element) {
            currentCat = catId;
            const catName = translations[currentLang].catNames[catId];
            document.getElementById('catSvg').innerHTML = catSvgs[catId];
            document.getElementById('catName').innerHTML = `✨ ${catName} ✨`;
            document.querySelectorAll('.cat-option').forEach(opt => opt.classList.remove('active'));
            element.classList.add('active');
            petCat();
        }
        
        function petCat() {
            const hero = document.getElementById('catHero');
            hero.classList.add('bounce-animation');
            setTimeout(() => hero.classList.remove('bounce-animation'), 500);
            const t = translations[currentLang];
            const randomMsg = t.supportMessages[Math.floor(Math.random() * t.supportMessages.length)];
            document.getElementById('catMessage').innerHTML = t.catMessages.pet(randomMsg);
        }
        
        async function askCat() {
            const input = document.getElementById('helpInput');
            const question = input.value.trim();
            const msgBox = document.getElementById('catMessage');
            const t = translations[currentLang];
            
            if (!question) {
                msgBox.innerHTML = t.helpPlaceholder + "<br><small>🐱</small>";
                return;
            }
            
            msgBox.innerHTML = t.catMessages.thinking;
            
            try {
                const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "HTTP-Referer": window.location.href,
                        "X-Title": "Professional Cat Psychologist"
                    },
                    body: JSON.stringify({
                        model: "google/gemini-2.0-flash-exp:free",
                        messages: [
                            {
                                role: "system",
                                content: t.systemPrompt
                            },
                            {
                                role: "user",
                                content: question
                            }
                        ],
                        temperature: 0.85,
                        max_tokens: 300
                    })
                });
                
                if (response.ok) {
                    const data = await response.json();
                    const answer = data?.choices?.[0]?.message?.content;
                    if (answer) {
                        msgBox.innerHTML = `${answer}<br><small>🐱 ${t.catNames[currentCat]} 🐱</small>`;
                        return;
                    }
                }
                
                throw new Error(`API error: ${response.status}`);
                
            } catch(e) {
                console.error('API error:', e);
                const randomResponse = FALLBACK_RESPONSES[currentLang][Math.floor(Math.random() * FALLBACK_RESPONSES[currentLang].length)];
                msgBox.innerHTML = `${randomResponse}<br><small>🐱 ${t.catNames[currentCat]} 🐱</small>`;
            }
        }
        
        // Инициализация
        const savedLang = localStorage.getItem('cat_lang') || 'ru';
        setLanguage(savedLang);
        
        // Отправляем данные в Telegram
        tg.ready();
        
        // Показываем приветствие
        setTimeout(() => {
            const t = translations[currentLang];
            document.getElementById('catMessage').innerHTML = t.catMessages.welcomeBack;
        }, 500);
    </script>
